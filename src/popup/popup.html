<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUGA</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">MUGA</div>
    <div class="toggle-wrap">
      <label class="toggle" title="Enable / disable MUGA">
        <input type="checkbox" id="enabled-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <section class="stats">
    <div class="stat">
      <span class="stat-value" id="stat-tracking">0</span>
      <span class="stat-label" data-i18n="stat_tracking">tracking removed</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-injected">0</span>
      <span class="stat-label" data-i18n="stat_injected">affiliate links</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-foreign">0</span>
      <span class="stat-label" data-i18n="stat_foreign">referrals detected</span>
    </div>
  </section>

  <section class="options">
    <label class="option-row">
      <span class="option-label">
        <span data-i18n="opt_inject_label">Inject our affiliate when none is present</span>
        <small data-i18n="opt_inject_hint">Only on stores where we have an active account</small>
      </span>
      <label class="toggle sm">
        <input type="checkbox" id="inject-toggle">
        <span class="slider"></span>
      </label>
    </label>

    <label class="option-row">
      <span class="option-label">
        <span data-i18n="opt_notify_label">Notify me when a third-party affiliate is detected</span>
        <small data-i18n="opt_notify_hint">Shows a non-intrusive toast for 5 seconds</small>
      </span>
      <label class="toggle sm">
        <input type="checkbox" id="notify-toggle">
        <span class="slider"></span>
      </label>
    </label>
  </section>

  <footer>
    <a href="#" id="open-options" data-i18n="link_advanced">Advanced settings →</a>
    <a href="https://ko-fi.com/yocreoquesi" target="_blank" id="donate-link" data-i18n="link_donate">Support the project</a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
