<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUGA</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo" id="logo-text">MUGA</div>
    <div class="toggle-wrap">
      <span class="toggle-label sr-only" data-i18n="toggle_enabled">Enable MUGA</span>
      <label class="toggle" title="Enable / disable MUGA">
        <input type="checkbox" id="enabled-toggle" aria-label="Enable MUGA">
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <section class="stats">
    <div class="stat stat-clickable" id="stat-urls-wrap" role="button" tabindex="0" title="Show history" data-i18n-title="show_history" aria-expanded="false">
      <span class="stat-value" id="stat-urls">0</span>
      <span class="stat-label" data-i18n="stat_urls">URLs cleaned</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-junk">0</span>
      <span class="stat-label" data-i18n="stat_junk">tracking params removed</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-referrals">0</span>
      <span class="stat-label" data-i18n="stat_referrals">affiliate tags detected</span>
    </div>
  </section>

  <details class="history" id="history" hidden>
    <summary class="history-summary" data-i18n="history_label">This session</summary>
    <div id="history-list"></div>
  </details>

  <section class="preview" id="preview" hidden>
    <div class="preview-header">
      <div class="preview-label" data-i18n="preview_label">This page</div>
      <div class="tab-badge" id="tab-badge" hidden aria-live="polite"></div>
    </div>
    <div class="preview-url before" id="preview-before"></div>
    <div class="preview-url after" id="preview-after"></div>
    <div class="preview-removed" id="preview-removed" hidden aria-live="polite"></div>
    <div class="preview-url clean" id="preview-clean" hidden></div>
    <a class="report-link" id="report-broken" href="#" hidden data-i18n="report_broken_label">Report a bug or suggest an improvement</a>
  </section>

  <div class="growth-bar" id="growth-bar" hidden>
    <button class="growth-btn" id="rate-btn" hidden aria-label="Rate MUGA">⭐ Rate MUGA</button>
    <button class="growth-btn" id="share-btn" aria-label="Share MUGA">📋 Share</button>
  </div>

  <footer>
    <a href="#" id="open-options" data-i18n="link_advanced">Settings →</a>
    <a href="#" id="popup-rate-link" data-i18n="rate_muga_link">Rate MUGA</a>
  </footer>

  <script src="../lib/browser-polyfill.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
