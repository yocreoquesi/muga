<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUGA</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">MUGA</div>
    <div class="toggle-wrap">
      <span class="toggle-label" data-i18n="toggle_enabled" style="display:none">Enable MUGA</span>
      <label class="toggle" title="Enable / disable MUGA">
        <input type="checkbox" id="enabled-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <section class="stats">
    <div class="stat">
      <span class="stat-value" id="stat-urls">0</span>
      <span class="stat-label" data-i18n="stat_urls">URLs cleaned</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-junk">0</span>
      <span class="stat-label" data-i18n="stat_junk">junk removed</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-referrals">0</span>
      <span class="stat-label" data-i18n="stat_referrals">referrals spotted</span>
    </div>
  </section>

  <section class="preview" id="preview" hidden>
    <div class="preview-header">
      <div class="preview-label" data-i18n="preview_label">This page</div>
      <div class="tab-badge" id="tab-badge" hidden></div>
    </div>
    <div class="preview-url before" id="preview-before"></div>
    <div class="preview-url after" id="preview-after"></div>
    <div class="preview-removed" id="preview-removed" hidden></div>
    <div class="preview-url clean" id="preview-clean" hidden data-i18n="preview_clean">✓ This page is already clean</div>
  </section>

  <div class="nudge" id="nudge" hidden>
    <p class="nudge-text" id="nudge-text"></p>
    <div class="nudge-actions">
      <a class="nudge-btn primary" id="nudge-review" href="#" target="_blank" data-i18n="nudge_review">⭐ Leave a review</a>
      <a class="nudge-btn" href="https://ko-fi.com/yocreoquesi" target="_blank" data-i18n="nudge_kofi">☕ Ko-fi</a>
      <button class="nudge-btn dismiss" id="nudge-dismiss" data-i18n="nudge_dismiss">✕</button>
    </div>
  </div>

  <section class="options">
    <label class="option-row">
      <span class="option-label">
        <span data-i18n="opt_inject_label">Inject our affiliate when none is present</span>
        <small data-i18n="opt_inject_hint">Only on stores where we have an active account</small>
      </span>
      <label class="toggle sm">
        <input type="checkbox" id="inject-toggle">
        <span class="slider"></span>
      </label>
    </label>

    <label class="option-row">
      <span class="option-label">
        <span data-i18n="opt_notify_label">Notify me when a third-party affiliate is detected</span>
        <small data-i18n="opt_notify_hint">Shows a non-intrusive toast for 5 seconds</small>
      </span>
      <label class="toggle sm">
        <input type="checkbox" id="notify-toggle">
        <span class="slider"></span>
      </label>
    </label>
  </section>

  <details class="history" id="history" hidden>
    <summary class="history-summary" data-i18n="history_label">Recent</summary>
    <div id="history-list"></div>
  </details>

  <footer>
    <a href="#" id="open-options" data-i18n="link_advanced">Advanced settings →</a>
    <a href="https://ko-fi.com/yocreoquesi" target="_blank" id="donate-link" data-i18n="link_donate">Support the project</a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
