name: CI

# Run tests on every pull request to main and on every push to main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate DNR rules
        run: npm run build:rules

      - name: Check DNR rules are up to date
        run: |
          if ! git diff --exit-code src/rules/tracking-params.json; then
            echo "ERROR: tracking-params.json is out of sync with affiliates.js. Run 'npm run build:rules' and commit the result."
            exit 1
          fi

      - name: Verify browser-polyfill integrity (#97)
        run: node tools/verify-polyfill-integrity.mjs

      - name: Run unit tests
        run: npm test

      - name: Lint extension
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (xvfb)
        run: xvfb-run npx playwright test
