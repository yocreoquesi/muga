name: Release

# Triggered when a version tag is pushed: git tag v1.0.0 && git push --tags
# Also supports manual dispatch: some main commits use [skip ci] in their
# message (e.g. the publish-rules.yml auto-commit) and GitHub honors that
# token on tag pushes when the tag points to such a commit, suppressing
# this workflow. workflow_dispatch gives ops a reliable manual trigger
# that takes a tag name input.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v1.10.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build Chrome extension
        run: npm run build:chrome

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Get version from tag
        id: version
        run: |
          # For push events, GITHUB_REF_NAME is the tag (v1.2.3); for
          # workflow_dispatch, read from the input.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Rename build artifacts
        run: |
          mv dist/chrome/*.zip dist/chrome/muga-${{ steps.version.outputs.VERSION }}-chrome.zip
          mv dist/firefox/*.zip dist/firefox/muga-${{ steps.version.outputs.VERSION }}-firefox.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            See [CHANGELOG.md](https://github.com/yocreoquesi/muga/blob/main/CHANGELOG.md) for what changed in this release.

            ## Install from source
            Download the `.zip` for your browser, unpack, and load as an unpacked extension.
            - **Chrome**: `chrome://extensions` → Developer mode → Load unpacked
            - **Firefox**: `about:debugging` → Load Temporary Add-on
          files: |
            dist/chrome/muga-${{ steps.version.outputs.VERSION }}-chrome.zip
            dist/firefox/muga-${{ steps.version.outputs.VERSION }}-firefox.zip
          draft: false
          prerelease: false

      # ── Firefox AMO submission ──────────────────────────────────────
      - name: Prepare source code archive for AMO
        run: git archive --format=zip --prefix=muga-source/ HEAD -o muga-source.zip

      - name: Inject release notes into AMO metadata
        run: bash scripts/prepare-amo-metadata.sh "${{ steps.version.outputs.VERSION }}"

      - name: Submit to Firefox AMO
        id: amo
        continue-on-error: true
        run: |
          bash scripts/with-firefox-manifest.sh \
            npx web-ext sign \
              --source-dir=src/ \
              --channel=listed \
              --amo-metadata=amo-metadata.json \
              --upload-source-code=muga-source.zip \
              --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
              --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
              --approval-timeout=0

      # ── Chrome Web Store submission ─────────────────────────────────
      # CWS API does not support release notes — changelog is in the
      # GitHub Release body and CHANGELOG.md for transparency.
      - name: Get CWS access token
        id: cws-token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CWS_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CWS_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CWS_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          TOKEN=$(echo "$RESPONSE" | node -e "process.stdin.on('data',d=>{const t=JSON.parse(d).access_token;if(!t){console.error('Failed to get token:',d.toString());process.exit(1);}console.log(t);})")
          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload to Chrome Web Store
        id: cws-upload
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${{ steps.cws-token.outputs.TOKEN }}" \
            -H "x-goog-api-version: 2" \
            -T "dist/chrome/muga-${{ steps.version.outputs.VERSION }}-chrome.zip" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::CWS upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Publish on Chrome Web Store
        if: steps.cws-upload.outcome == 'success'
        id: cws-publish
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ steps.cws-token.outputs.TOKEN }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}/publish")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::CWS publish failed with HTTP $HTTP_CODE"
            exit 1
          fi

      # ── Submission summary ──────────────────────────────────────────
      - name: Check store submissions
        if: always()
        run: |
          AMO="${{ steps.amo.outcome }}"
          CWS_UP="${{ steps.cws-upload.outcome }}"
          CWS_PUB="${{ steps.cws-publish.outcome }}"
          echo "## Store submission results" >> "$GITHUB_STEP_SUMMARY"
          echo "- AMO: ${AMO}" >> "$GITHUB_STEP_SUMMARY"
          echo "- CWS upload: ${CWS_UP}" >> "$GITHUB_STEP_SUMMARY"
          echo "- CWS publish: ${CWS_PUB}" >> "$GITHUB_STEP_SUMMARY"
          # Fail only if BOTH stores failed
          if [ "$AMO" = "failure" ] && [ "$CWS_UP" = "failure" -o "$CWS_PUB" = "failure" ]; then
            echo "::error::Both AMO and CWS submissions failed"
            exit 1
          fi
          [ "$AMO" = "failure" ] && echo "::warning::AMO submission failed (version may already exist)"
          [ "$CWS_UP" = "failure" -o "$CWS_PUB" = "failure" ] && echo "::warning::CWS submission failed"
          exit 0
